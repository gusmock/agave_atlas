services:
  - type: web
    name: agave-obs
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: bash scripts/start_render.sh
    healthCheckPath: /health
    envVars:
      - key: AGAVE_DEBUG
        value: "false"
      - key: AGAVE_DB_PATH
        value: /tmp/agave_obs.sqlite3
      - key: AGAVE_UPLOAD_DIR
        value: /tmp/uploads/documents
      - key: AGAVE_ADMIN_USER
        value: admin
      - key: AGAVE_ADMIN_PASSWORD
        sync: false
      - key: AGAVE_SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-lite
